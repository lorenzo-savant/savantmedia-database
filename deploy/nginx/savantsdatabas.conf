# ════════════════════════════════════════════════════════════════
# savantsdatabas.conf — Nginx reverse proxy per FastAPI backend
# ────────────────────────────────────────────────────────────────
# Installazione (Ubuntu 24.04 LTS):
#   sudo apt install nginx certbot python3-certbot-nginx
#   sudo cp deploy/nginx/savantsdatabas.conf \
#           /etc/nginx/sites-available/savantsdatabas
#   sudo ln -s /etc/nginx/sites-available/savantsdatabas \
#              /etc/nginx/sites-enabled/savantsdatabas
#   sudo nginx -t && sudo systemctl reload nginx
#
#   # Genera certificato Let's Encrypt (sostituisce server_name reale):
#   sudo certbot --nginx -d api.savantsdatabas.savantmedia.se \
#                --redirect --agree-tos -m lorenzo@savantmedia.se
#
# Rate-limit + WebSocket headers + long scrape timeouts.
# Sostituisci `api.savantsdatabas.savantmedia.se` con il tuo dominio reale.
# ════════════════════════════════════════════════════════════════


# Rate-limit zone: 30 req/s per IP, burst 60. Anti-abuse leggero.
limit_req_zone $binary_remote_addr zone=savantapi:10m rate=30r/s;

# Necessario per il proxy WebSocket (Supabase Realtime passthrough).
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}


# ─── HTTP → HTTPS redirect (gestito anche da certbot) ────────────
server {
    listen 80;
    listen [::]:80;
    server_name api.savantsdatabas.savantmedia.se;

    # Certbot webroot challenge.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}


# ─── HTTPS reverse proxy → uvicorn :8000 ─────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.savantsdatabas.savantmedia.se;

    # Certbot inserisce qui ssl_certificate / ssl_certificate_key.
    # Esempio (sostituisci con i tuoi path reali):
    # ssl_certificate     /etc/letsencrypt/live/api.savantsdatabas.savantmedia.se/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/api.savantsdatabas.savantmedia.se/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # HSTS — solo dopo aver verificato che tutto va via HTTPS.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy strict-origin-when-cross-origin;

    # Body size: lascia spazio per upload occasionali (json batch).
    client_max_body_size 25m;

    # Rate-limit per IP (esclude /health perché può servire per uptime ping).
    location = /health {
        proxy_pass http://127.0.0.1:8000/health;
        proxy_set_header Host $host;
        access_log off;
    }

    location / {
        limit_req zone=savantapi burst=60 nodelay;

        proxy_pass http://127.0.0.1:8000;

        # Headers standard
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        # WebSocket upgrade (Supabase Realtime via server-side proxy se mai serve).
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Long timeouts per scrape jobs (T4/T5 possono durare minuti).
        proxy_connect_timeout 30s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;
        send_timeout          300s;

        # Buffering: lascia che Nginx accumuli risposte piccole; chunked transfer
        # per Server-Sent Events o stream lunghi va disabilitato.
        proxy_buffering on;
        proxy_request_buffering on;
    }
}
